services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: rainbow_odoo
      POSTGRES_USER: violet_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  odoo:
    image: odoo:17
    restart: always
    depends_on:
      - postgres
    ports:
      - "8069:8069"
    volumes:
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf
      - ./data/odoo:/var/lib/odoo
    # After the first run is completed, replace the line below with the commented one:
    # command: odoo -c /etc/odoo/odoo.conf
    command: odoo -c /etc/odoo/odoo.conf -i base
    environment:
      HOST: postgres
      PORT: 5432
      USER: violet_user
      PASSWORD: ${POSTGRES_PASSWORD}