version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: rainbow_odoo
      POSTGRES_USER: violet_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  odoo:
    image: odoo:17
    restart: always
    depends_on:
      - postgres
    ports:
      - "8069:8069"
    volumes:
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf
      - ./data/odoo:/var/lib/odoo
    command: odoo -c /etc/odoo/odoo.conf
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
