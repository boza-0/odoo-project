[options]

; ─── Paths ────────────────────────────────
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; ─── Security ─────────────────────────────
admin_passwd = CHANGE_ME_BEFORE_DEPLOY
proxy_mode = False

; ─── Performance ──────────────────────────
workers = 4
max_cron_threads = 2
limit_memory_soft = 2147483648
limit_memory_hard = 2684354560
limit_time_cpu = 60
limit_time_real = 120

; ─── Logging ──────────────────────────────
log_level = info

; ─── Database ─────────────────────────────
db_host = postgres
db_port = 5432
db_name = rainbow_odoo
db_user = violet_user
